<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:,">
    <title>Đăng Ký - PTIT Exam System</title>
    <style>
        /* Ensure register form displays properly */
        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            margin: 0 auto;
        }
        
        .register-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .register-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        
        .form-field label {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
        
        .form-field input[type="text"],
        .form-field input[type="email"],
        .form-field input[type="password"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }
        
        .form-field input:focus {
            outline: none;
            border-color: #990000;
            box-shadow: 0 0 5px rgba(153,0,0,0.2);
        }
        
        .form-field .error-message {
            color: #ff6b6b;
            font-size: 12px;
            min-height: 16px;
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        
        .strength-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .strength-bar-fill {
            height: 100%;
            width: 0%;
            background: #ff6b6b;
            transition: all 0.3s;
        }
        
        .terms-field {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 10px 0;
        }
        
        .terms-field input[type="checkbox"] {
            margin-top: 3px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .terms-field label {
            margin: 0;
            font-weight: normal;
            font-size: 13px;
            cursor: pointer;
        }
        
        .terms-field a {
            color: #0066cc;
            text-decoration: none;
        }
        
        .terms-field a:hover {
            text-decoration: underline;
        }
        
        .register-btn {
            padding: 12px;
            background: #990000;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .register-btn:hover {
            background: #7a0000;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(153,0,0,0.3);
        }
        
        .auth-links {
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        
        .auth-links p {
            font-size: 14px;
            margin: 8px 0;
        }
        
        .auth-links a {
            color: #990000;
            text-decoration: none;
            font-weight: bold;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .register-message {
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            min-height: 40px;
            display: none;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .register-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: flex;
        }
        
        .register-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: flex;
        }
    </style>
</head>
<body class="auth-page">
    <div class="register-container">
        <div class="register-box">
            <div class="login-header">
                <img src="../images/ptit-logo.png" alt="PTIT Logo" class="login-logo">
                <h1>PTIT Exam</h1>
                <p>Đăng ký tài khoản sinh viên</p>
            </div>

            <form id="registerForm" class="register-form">
                <!-- Username -->
                <div class="form-field">
                    <label for="registerUsername">Tên người dùng <span style="color: #ff6b6b;">*</span></label>
                    <input type="text" id="registerUsername" name="username" placeholder="3-20 ký tự (chữ, số, _)" required>
                    <span class="error-message" id="registerUsernameError"></span>
                </div>

                <!-- Email -->
                <div class="form-field">
                    <label for="registerEmail">Email <span style="color: #ff6b6b;">*</span></label>
                    <input type="email" id="registerEmail" name="email" placeholder="example@ptit.edu.vn" required>
                    <span class="error-message" id="registerEmailError"></span>
                </div>

                <!-- Password -->
                <div class="form-field">
                    <label for="registerPassword">Mật khẩu <span style="color: #ff6b6b;">*</span></label>
                    <input type="password" id="registerPassword" name="password" placeholder="Tối thiểu 6 ký tự" required>
                    <span class="error-message" id="registerPasswordError"></span>
                    <div class="password-strength">
                        Độ mạnh: <span id="strengthText" style="color: #ff6b6b;">-</span>
                        <div class="strength-bar">
                            <div id="strengthBar" class="strength-bar-fill"></div>
                        </div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-field">
                    <label for="registerConfirmPassword">Xác nhận mật khẩu <span style="color: #ff6b6b;">*</span></label>
                    <input type="password" id="registerConfirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                    <span class="error-message" id="registerConfirmPasswordError"></span>
                </div>

                <!-- Terms and Conditions -->
                <div class="form-field">
                    <div class="terms-field">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms">
                            Tôi đồng ý với <a href="#" onclick="return false;">điều khoản dịch vụ</a> 
                            và <a href="#" onclick="return false;">chính sách bảo mật</a>
                        </label>
                    </div>
                    <span class="error-message" id="registerTermsError"></span>
                </div>

                <button type="submit" class="register-btn">Đăng Ký</button>
            </form>

            <div id="registerMessage" class="register-message"></div>

            <div class="auth-links">
                <p>Đã có tài khoản? <a href="../index.html">Đăng nhập tại đây</a></p>
            </div>
        </div>
    </div>

    <script src="../js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const passwordInput = document.getElementById('registerPassword');
            
            if (passwordInput) {
                passwordInput.addEventListener('input', function() {
                    updatePasswordStrength(this.value);
                });
            }
            
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    handleRegisterSubmit();
                });
            }
        });

        function updatePasswordStrength(password) {
            let strength = 0;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            let barColor = '#ff6b6b';
            let barWidth = '0%';
            let text = '-';
            
            if (strength === 0) {
                barColor = '#ff6b6b';
                barWidth = '0%';
                text = '-';
            } else if (strength <= 2) {
                barColor = '#ff6b6b';
                barWidth = '33%';
                text = 'Yếu';
            } else if (strength <= 3) {
                barColor = '#ffd93d';
                barWidth = '66%';
                text = 'Trung bình';
            } else {
                barColor = '#6bcf7f';
                barWidth = '100%';
                text = 'Mạnh';
            }
            
            strengthBar.style.backgroundColor = barColor;
            strengthBar.style.width = barWidth;
            strengthText.textContent = text;
            strengthText.style.color = barColor;
        }

        function handleRegisterSubmit() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            const usernameError = document.getElementById('registerUsernameError');
            const emailError = document.getElementById('registerEmailError');
            const passwordError = document.getElementById('registerPasswordError');
            const confirmPasswordError = document.getElementById('registerConfirmPasswordError');
            const termsError = document.getElementById('registerTermsError');
            const registerMessage = document.getElementById('registerMessage');
            
            // Reset errors
            usernameError.textContent = '';
            emailError.textContent = '';
            passwordError.textContent = '';
            confirmPasswordError.textContent = '';
            termsError.textContent = '';
            registerMessage.className = 'register-message';
            
            let isValid = true;
            
            // Validate username
            if (!username) {
                usernameError.textContent = 'Vui lòng nhập tên người dùng';
                isValid = false;
            } else if (!validateUsername(username)) {
                usernameError.textContent = 'Tên người dùng phải có 3-20 ký tự (chữ, số, _)';
                isValid = false;
            }
            
            // Validate email
            if (!email) {
                emailError.textContent = 'Vui lòng nhập email';
                isValid = false;
            } else if (!validateEmail(email)) {
                emailError.textContent = 'Email không hợp lệ';
                isValid = false;
            }
            
            // Validate password
            if (!password) {
                passwordError.textContent = 'Vui lòng nhập mật khẩu';
                isValid = false;
            } else if (!validatePassword(password)) {
                passwordError.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
                isValid = false;
            }
            
            // Validate confirm password
            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Vui lòng xác nhận mật khẩu';
                isValid = false;
            } else if (password !== confirmPassword) {
                confirmPasswordError.textContent = 'Mật khẩu xác nhận không khớp';
                isValid = false;
            }
            
            // Validate terms
            if (!agreeTerms) {
                termsError.textContent = 'Vui lòng đồng ý với điều khoản dịch vụ';
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Register success
            registerMessage.className = 'register-message success';
            registerMessage.textContent = 'Đăng ký thành công! Chuyển hướng...';
            
            // Store new user
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push({
                username: username,
                email: email,
                password: password,
                registeredAt: new Date().toISOString()
            });
            localStorage.setItem('users', JSON.stringify(users));
            
            // Redirect to login
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 1500);
        }
    </script>
</body>
</html>
