<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" href="data:,">
    <title>Đăng Nhập - PTIT Exam System</title>
</head>
<body class="auth-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="images/ptit-logo.png" alt="PTIT Logo" class="login-logo">
                <h1>PTIT Exam</h1>
                <p>Hệ thống kiểm tra trực tuyến</p>
            </div>

            <div class="role-selector">
                <button class="role-btn active" id="studentRole" data-role="student">
                    👤 Sinh Viên
                </button>
                <button class="role-btn" id="adminRole" data-role="admin">
                    👨‍💼 Admin
                </button>
            </div>

            <!-- Student Login Form -->
            <form id="studentLoginForm" class="login-form active-form">
                <div class="form-group">
                    <label for="studentUsername">Tên đăng nhập</label>
                    <input type="text" id="studentUsername" name="username" placeholder="Nhập tên đăng nhập" required>
                    <span class="error-message" id="studentUsernameError"></span>
                </div>

                <div class="form-group">
                    <label for="studentPassword">Mật khẩu</label>
                    <input type="password" id="studentPassword" name="password" placeholder="Nhập mật khẩu" required>
                    <span class="error-message" id="studentPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-login">Đăng Nhập</button>
            </form>

            <!-- Admin Login Form -->
            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label for="adminUsername">Tên đăng nhập</label>
                    <input type="text" id="adminUsername" name="username" placeholder="Nhập tên đăng nhập admin" required>
                    <span class="error-message" id="adminUsernameError"></span>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Mật khẩu</label>
                    <input type="password" id="adminPassword" name="password" placeholder="Nhập mật khẩu admin" required>
                    <span class="error-message" id="adminPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-login">Đăng Nhập Admin</button>
            </form>

            <div id="loginMessage" class="login-message"></div>

            <div class="auth-links">
                <p>Chưa có tài khoản? <a href="#" id="registerLink">Đăng ký tại đây</a></p>
            </div>

            <div class="demo-credentials">
                <p><strong>Demo Accounts:</strong></p>
                <hr>
                <p><strong>Sinh viên:</strong> student / student123</p>
                <p><strong>Admin:</strong> admin / admin123</p>
            </div>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
